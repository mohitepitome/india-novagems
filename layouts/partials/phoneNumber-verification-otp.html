<style>
        .otp-input {
            width: 55px;
            height: 55px;
            font-size: 22px;
            text-align: center;
            border-radius: 8px;
        }
    </style>



        <!-- Phone Form -->
        <form id="phoneForm" class="mb-3">
            <label for="Name">Choose country code and phone number</label>
            <div class="input-group mb-3 ">
                <select id="countryCode" class="form-select select-cc" aria-label="Country calling code" required>
                    <option value="" selected disabled>Choose country</option>
                    <option value="+1" data-country="US">🇺🇸 United States (+1)</option>
                    <option value="+44" data-country="GB">🇬🇧 United Kingdom (+44)</option>
                    <option value="+61" data-country="AU">🇦🇺 Australia (+61)</option>
                    <option value="+81" data-country="JP">🇯🇵 Japan (+81)</option>
                    <option value="+82" data-country="KR">🇰🇷 South Korea (+82)</option>
                    <option value="+86" data-country="CN">🇨🇳 China (+86)</option>
                    <option value="+91" data-country="IN">🇮🇳 India (+91)</option>
                    <option value="+92" data-country="PK">🇵🇰 Pakistan (+92)</option>
                    <option value="+971" data-country="AE">🇦🇪 UAE (+971)</option>
                    <option value="+972" data-country="IL">🇮🇱 Israel (+972)</option>
                    <option value="+973" data-country="BH">🇧🇭 Bahrain (+973)</option>
                    <option value="+974" data-country="QA">🇶🇦 Qatar (+974)</option>
                    <option value="+975" data-country="BT">🇧🇹 Bhutan (+975)</option>
                    <option value="+977" data-country="NP">🇳🇵 Nepal (+977)</option>
                    <option value="+880" data-country="BD">🇧🇩 Bangladesh (+880)</option>
                    <option value="+94" data-country="LK">🇱🇰 Sri Lanka (+94)</option>
                    <option value="+60" data-country="MY">🇲🇾 Malaysia (+60)</option>
                    <option value="+62" data-country="ID">🇮🇩 Indonesia (+62)</option>
                    <option value="+63" data-country="PH">🇵🇭 Philippines (+63)</option>
                    <option value="+64" data-country="NZ">🇳🇿 New Zealand (+64)</option>
                    <option value="+7" data-country="RU">🇷🇺 Russia (+7)</option>
                    <option value="+55" data-country="BR">🇧🇷 Brazil (+55)</option>
                    <option value="+34" data-country="ES">🇪🇸 Spain (+34)</option>
                    <option value="+39" data-country="IT">🇮🇹 Italy (+39)</option>
                    <option value="+33" data-country="FR">🇫🇷 France (+33)</option>
                    <option value="+49" data-country="DE">🇩🇪 Germany (+49)</option>
                    <option value="+52" data-country="MX">🇲🇽 Mexico (+52)</option>
                    <option value="+234" data-country="NG">🇳🇬 Nigeria (+234)</option>
                    <option value="+27" data-country="ZA">🇿🇦 South Africa (+27)</option>
                </select>
                <input id="localPhone" type="text" class="form-control" placeholder="Enter phone number" required>
            </div>
            <button id="verifyBtn" type="submit" class="btn btn-primary">Verify phone number</button>
        </form>

        <!-- Result message -->
        <div id="result"></div>

        <!-- OTP Section (Hidden initially) -->
        <div id="otpSection" class="mt-4 d-none">
            <p class="mb-2">We sent a code to <span id="otpTarget"></span></p>
            <div id="otpInputs" class="d-flex gap-2 justify-content-center mb-2">
                <input type="text" maxlength="1" class="form-control otp-input">
                <input type="text" maxlength="1" class="form-control otp-input">
                <input type="text" maxlength="1" class="form-control otp-input">
                <input type="text" maxlength="1" class="form-control otp-input">
            </div>
            <div id="otpError" class="text-danger mt-2 d-none"></div>
            <p id="otpTimer" class="text-secondary mt-2"></p>
            <button id="resendOtpBtn" type="button" class="btn btn-link d-none">Resend OTP</button>
            <div class="d-grid mt-3">
                <button id="confirmOtpBtn" class="btn btn-success">Confirm</button>
            </div>
        </div>


    <script>
        const GRAPHQL_ENDPOINT = "https://testusergateway.novagems.io/graphql";

        const form = document.getElementById('phoneForm');
        const countryCodeSelect = document.getElementById('countryCode');
        const localPhoneInput = document.getElementById('localPhone');
        const verifyBtn = document.getElementById('verifyBtn');
        const result = document.getElementById('result');

        const otpSection = document.getElementById('otpSection');
        const otpInputs = document.querySelectorAll('#otpInputs input');
        const otpTarget = document.getElementById('otpTarget');
        const otpError = document.getElementById('otpError');
        const otpTimer = document.getElementById('otpTimer');
        const resendOtpBtn = document.getElementById('resendOtpBtn');
        const confirmOtpBtn = document.getElementById('confirmOtpBtn');

        let currentDeviceId = null;
        let otpCountdown;
        let otpTimeLeft = 120;

        // ✅ Get Public IP
        async function getIp() {
            try {
                const res = await fetch("https://api.ipify.org?format=json");
                const data = await res.json();
                return data.ip;
            } catch (e) {
                return "0.0.0.0";
            }
        }

        // ✅ Get Location (Fixed)
        function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve({ latitude: "0", longitude: "0" });
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        resolve({
                            latitude: pos.coords.latitude.toString(),
                            longitude: pos.coords.longitude.toString()
                        });
                    },
                    (err) => {
                        console.warn("Geolocation error:", err.message);
                        resolve({ latitude: "0", longitude: "0" });
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            });
        }

        // ✅ Build signup variables dynamically
        async function buildSignupArgs(phoneNumber, countryCode) {
            const ip = await getIp();
            const location = await getLocation();

            const country = countryCodeSelect.options[countryCodeSelect.selectedIndex].text.split(" ")[1];
            const deviceName = navigator.platform;

            let deviceType = "WEB";
            if (/Mobi|Android/i.test(navigator.userAgent)) deviceType = "MOBILE";
            else if (/Tablet|iPad/i.test(navigator.userAgent)) deviceType = "TABLET";

            const signupArgs = {
                phoneNumber,
                countryCode,
                appVersion: "1.0.0",
                country,
                deviceName,
                deviceToken: "abc123",
                deviceType,
                ip,
                latitude: location.latitude,
                longitude: location.longitude
            };

            // 🔍 Debug logs
            console.log("📌 Signup Variables:", signupArgs);

            return { signupArgs };
        }

        // ✅ Signup API
        async function sendOtpRequest(phoneNumber, countryCode) {
            const query = `
                mutation signup($signupArgs: SignupArgs!) {
                signup(signupArgs: $signupArgs) {
                    ... on Users {
                    deviceId
                    phoneNumber
                    countryCode
                    message
                    __typename
                    }
                    ... on Error {
                    message
                    __typename
                    }
                }
                }`;
            const variables = await buildSignupArgs(phoneNumber, countryCode);

            const response = await fetch(GRAPHQL_ENDPOINT, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ query, variables })
            });

            return (await response.json()).data?.signup || null;
        }

        // ✅ Verify OTP API
        async function verifyOtpRequest(deviceId, otp, phoneNumber, countryCode) {
            const query = `
            mutation verifyOtp($verifyOtpArgs: VerifyOtpArgs!) {
            verifyOtp(verifyOtpArgs: $verifyOtpArgs) {
                ... on Users {
                message
                token
                __typename
                }
                ... on Error {
                message
                __typename
                }
            }
            }`;
            const variables = { verifyOtpArgs: { phoneNumber, countryCode, deviceId, otp } };

            console.log("📌 Verify OTP Variables:", variables);

            const response = await fetch(GRAPHQL_ENDPOINT, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ query, variables })
            });
            return (await response.json()).data?.verifyOtp || null;
        }

        // ✅ Resend OTP API
        async function resendOtpRequest(phoneNumber, countryCode, deviceId) {
            const query = `
                mutation sendOtp($sendOtpArgs: SendOtpArgs!) {
                sendOtp(sendOtpArgs: $sendOtpArgs) {
                    ... on Users {
                    deviceId
                    phoneNumber
                    countryCode
                    message
                    __typename
                    }
                    ... on Error {
                    message
                    __typename
                    }
                }
                }`;
            const variables = { sendOtpArgs: { phoneNumber, countryCode, deviceId } };

            console.log("📌 Resend OTP Variables:", variables);

            const response = await fetch(GRAPHQL_ENDPOINT, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ query, variables })
            });
            return (await response.json()).data?.sendOtp || null;
        }

        // ✅ Timer
        function startOtpTimer() {
            clearInterval(otpCountdown);
            otpTimeLeft = 120;
            resendOtpBtn.classList.add("d-none");
            otpTimer.classList.remove("d-none");

            otpCountdown = setInterval(() => {
                otpTimeLeft--;
                const minutes = Math.floor(otpTimeLeft / 60);
                const seconds = otpTimeLeft % 60;
                otpTimer.textContent = `OTP expires in ${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;
                if (otpTimeLeft <= 0) {
                    clearInterval(otpCountdown);
                    otpTimer.classList.add("d-none");
                    resendOtpBtn.classList.remove("d-none");
                }
            }, 1000);
        }

        // ✅ Form Submit
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            verifyBtn.disabled = true;
            verifyBtn.textContent = "Sending OTP...";
            result.textContent = "Sending OTP...";
            result.className = "alert alert-info mt-3";

            const phoneNumber = localPhoneInput.value;
            const countryCode = countryCodeSelect.value;

            const response = await sendOtpRequest(phoneNumber, countryCode);

            verifyBtn.disabled = false;
            verifyBtn.textContent = "Verify phone number";

            if (response?.__typename === "Users") {
                currentDeviceId = response.deviceId;
                otpTarget.textContent = `${countryCode}${phoneNumber}`;
                result.textContent = "";
                result.className = "";

                otpSection.classList.remove("d-none");
                otpInputs.forEach(i => i.value = "");
                startOtpTimer();
            } else {
                result.textContent = response?.message || "Error sending OTP";
                result.className = "alert alert-danger mt-3";
            }
        });

        // ✅ Auto move between OTP boxes
        otpInputs.forEach((input, index) => {
            input.addEventListener("input", () => {
                if (input.value.length === 1 && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            });
        });

        // ✅ Confirm OTP
        confirmOtpBtn.addEventListener("click", async () => {
            const otp = Array.from(otpInputs).map(i => i.value).join("");
            if (otp.length !== 4) {
                otpError.textContent = "Enter a valid 4-digit OTP";
                otpError.classList.remove("d-none");
                return;
            }

            confirmOtpBtn.disabled = true;
            confirmOtpBtn.textContent = "Verifying...";

            const response = await verifyOtpRequest(currentDeviceId, otp, localPhoneInput.value, countryCodeSelect.value);

            confirmOtpBtn.disabled = false;
            confirmOtpBtn.textContent = "Confirm";

            if (response?.__typename === "Users") {
                result.textContent = "Phone number verified successfully!";
                result.className = "alert alert-success mt-3";
                otpError.classList.add("d-none");
            } else {
                otpError.textContent = response?.message || "Invalid OTP";
                otpError.classList.remove("d-none");
            }
        });

        // ✅ Resend OTP
        resendOtpBtn.addEventListener("click", async () => {
            resendOtpBtn.disabled = true;
            resendOtpBtn.textContent = "Resending...";
            const response = await resendOtpRequest(localPhoneInput.value, countryCodeSelect.value, currentDeviceId);
            resendOtpBtn.disabled = false;
            resendOtpBtn.textContent = "Resend OTP";

            if (response?.__typename === "Users") {
                otpInputs.forEach(i => i.value = "");
                otpError.classList.add("d-none");
                startOtpTimer();
            } else {
                otpError.textContent = response?.message || "Error resending OTP";
                otpError.classList.remove("d-none");
            }
        });
    </script>
