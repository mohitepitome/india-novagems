<script>
    $(document).ready(function() {

        // Gets the video src from the data-src on each button

        var $videoSrc;
        $('.video-btn').click(function() {
            $videoSrc = $(this).data("src");
        });



        // when the modal is opened autoplay it  
        $('#myModal').on('shown.bs.modal', function(e) {

                // set the video src to autoplay and not to show related video. Youtube related video is like a box of chocolates... you never know what you're gonna get
                $("#video").attr('src', $videoSrc + "?autoplay=1&amp;modestbranding=1&amp;showinfo=0");
            })
            // stop playing the youtube video when I close the modal
        $('#myModal').on('hide.bs.modal', function(e) {
            // a poor man's stop video
            $("#video").attr('src', $videoSrc);
        })

        // document ready  
    });
</script>

<script>
    // api get-started-for-free---------------------------------------------------

    $(function() {
        $("#get-started-for-free").on("submit", function(event) {
            event.preventDefault();

            var email = $('input[name=email]').val();
            // Example request JSON:
            var data = {
                "fields": [{
                    "name": "email",
                    "value": email
                }],
                "legalConsentOptions": { // Include this object when GDPR options are enabled
                    "consent": {
                        "consentToProcess": true,
                        "text": "I agree to allow Example Company to store and process my personal data.",
                        "communications": [{
                            "value": true,
                            "subscriptionTypeId": 999,
                            "text": "I agree to receive marketing communications from Example Company."
                        }]
                    }
                }
            }

            var final_data = JSON.stringify(data)

            $.ajax({
                url: "https://api.hsforms.com/submissions/v3/integration/submit/4159731/8b79e284-6120-49e5-aa5b-b18940a7432f",
                headers: {
                    'Content-Type': 'application/json',
                },
                type: "post",
                data: final_data,
                success: function(d) {
                    $('input[name=email]').val("")
                    if (d) {
                        // window.location = d.redirectUri;
                        // window.open(d.redirectUri, "_blank")
                        window.location = "/get-started-for-free";
                    } else {
                        alert("Enter your email address");
                    }
                },
                error: function(e) {
                    alert("Enter your email address");
                }
            });
        });
    })

<script>
    var TxtRotate = function(el, toRotate, period) {
        this.toRotate = toRotate;
        this.el = el;
        this.loopNum = 0;
        this.period = parseInt(period, 100) || 4000;
        this.txt = '';
        this.tick();
        this.isDeleting = false;
    };

    TxtRotate.prototype.tick = function() {
        var i = this.loopNum % this.toRotate.length;
        var fullTxt = this.toRotate[i];

        if (this.isDeleting) {
            this.txt = fullTxt.substring(0, this.txt.length - 1);
        } else {
            this.txt = fullTxt.substring(0, this.txt.length + 1);
        }

        this.el.innerHTML = '<span class="wrap">' + this.txt + '</span>';

        var that = this;
        var delta = 150 - Math.random() * 100;

        if (this.isDeleting) {
            delta /= 2;
        }

        if (!this.isDeleting && this.txt === fullTxt) {
            delta = this.period;
            this.isDeleting = true;
        } else if (this.isDeleting && this.txt === '') {
            this.isDeleting = false;
            this.loopNum++;
            delta = 500;
        }

        setTimeout(function() {
            that.tick();
        }, delta);
    };

    window.onload = function() {
        var elements = document.getElementsByClassName('txt-rotate');
        for (var i = 0; i < elements.length; i++) {
            var toRotate = elements[i].getAttribute('data-rotate');
            var period = elements[i].getAttribute('data-period');
            if (toRotate) {
                new TxtRotate(elements[i], JSON.parse(toRotate), period);
            }
        }
        // INJECT CSS
        var css = document.createElement("style");
        css.type = "text/css";
        css.innerHTML = ".txt-rotate > .wrap { border-right: 0.08em solid #786ce6 }";
        document.body.appendChild(css);
    };
</script>



<script>
    $('#step-list li.option').click(function() {
        $(this).addClass('active');
        var stepFor = $(this).attr('for');
        $('.billing__main__content__forms__div').removeClass('active');
        $('#' + stepFor).addClass('active');

        var dataStep = $(this).attr('data-step');
        $('#step-list li.option').each(function() {
            if ($(this).attr('data-step') > dataStep) {
                $(this).removeClass('active');
            } else {
                $(this).addClass('active');
            }
            if ($(this).attr('data-step') >= dataStep) {
                $(this).removeClass('done');
            } else {
                $(this).addClass('done');
            }
        });
    });

        $('#step-list li.option').each(function() {

            }

<script>
    // Set the date we're counting down to
    var countDownDate = new Date("Dec 02, 2024 13:29:00").getTime();

    // Update the count down every 1 second
    var x = setInterval(function() {

        // Get today's date and time
        var now = new Date().getTime();

        // Find the distance between now and the count down date
        var distance = countDownDate - now;

        // Time calculations for days, hours, minutes and seconds
        var days = Math.floor(distance / (1000 * 60 * 60 * 24));
        var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        var seconds = Math.floor((distance % (1000 * 60)) / 1000);

        // Output the result in an element with id="demo"
        document.getElementById("demo1").innerHTML = days + "<br> day ";
        document.getElementById("demo2").innerHTML = hours + "<br> hours ";
        document.getElementById("demo3").innerHTML = minutes + "<br> minute ";
        document.getElementById("demo4").innerHTML = seconds + "<br> seconds ";
        // If the count down is over, write some text 
        if (distance < 0) {
            clearInterval(x);
            document.getElementById("demo").innerHTML = "EXPIRED";
        }
    }, 1000);
</script>
