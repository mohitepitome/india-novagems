<body>
    <div class="full-screen d-flex">
        <!-- Left Section -->
        <div class="left-section d-flex align-items-center w-100">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-8 text-center">
                        <img src="/images/novagems-img/Logo.svg" alt="Logo" class="mb-4 logo-img">
                        <h1 class="mb-3 fw-bold">Welcome to Novagems</h1>
                        <p class="mb-5 subtitle">Scheduling and Workforce Management System</p>

                        <!-- Card Buttons -->
                        <div class="option-box mb-3 d-flex justify-content-between align-items-center">
                            <span>Scheduling & Workforce Management Software</span>
                            <img src="/images/novagems-img/next-login.svg" alt="Arrow" class="arrow-icon">
                        </div>
                        <div class="option-box d-flex justify-content-between align-items-center">
                            <span>Security Guard Management Software</span>
                            <img src="/images/novagems-img/next-login.svg" alt="Arrow" class="arrow-icon">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Section -->
        <div class="right-section d-none d-md-flex align-items-center justify-content-center">
            <img src="/images/novagems-img/login-img.svg" alt="Illustration" class="img-fluid hero-img">
        </div>
    </div>

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .full-screen {
            height: 100vh;
            overflow: hidden;
        }

        .left-section {
            background-color: #fff;
            flex: 1;
            padding: 40px;
        }

        .right-section {
            background-color: #786CE6;
            /* Purple background */
            flex: 1;
        }

        

        .subtitle {
            font-size: 16px;
            color: #555;
        }

        .option-box {
            border: 1px solid #8D6DFE;
            border-radius: 8px;
            padding: 15px 20px;
            max-width: 100%;
            color: #8D6DFE;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .option-box:hover {
            background-color: #f8f6ff;
            cursor: pointer;
        }

       

        .hero-img {
            max-width: 80%;
            height: auto;
        }
    </style>
</body>
