items:
  - title: "Employee Scheduling Software "
    text: The software helps you in creating, managing, and communicating work schedules for staff, optimizing efficiency, reducing conflicts, and improving overall workforce management.
  - title: "Real Time Scheduling and Communication"
    text: With Novagems, you can schedule and manage the team easily and efficiently. Track and monitor your staff anywhere and anytime. No need to spend hours making schedules and keeping everything till the last minute.
  - title: "Workforce Engagement"
    text: With a seamless management software keep the team well organized and connected. Not only focus on free employee scheduling but team building too. Because a happy and well connected team will increase the customer satisfaction and boost the sales. 
   