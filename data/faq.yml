items:
  - question: "What is Novagems?"
    answer: "Novagems is a security guard management software that provides quick, efficient, and one-stop solution for security service management. Befitted with a user-friendly interface, Novagems provide real-time security data to security companies to manage their security guards and render uncompromised security operations. It is a mobile web-based application that aims to boost the communication flow in the team, provide real-time incident reports, and boost the performance of your security guards significantly."
  - question: "What happens if I want to cancel my subscription? Is there a contract?"
    answer: "We believe in relationships that build on the ground of mutual trust and respect. This is the key reason we do not put up any contract and offer the freedom of any time cancelation of subscription to our clients. We charge on a monthly -basis which allows the client to cancel the subscription whenever they do not get satisfactory results."
  - question: "How long is the free trial?"
    answer: "Novagems is available on a free trial period of 14 days after which you will have to buy a full-service subscription, to be paid on a monthly basis. The free trial period allows you to evaluate the efficiency of the software and enjoy its instant benefits."
  - question: "Do you offer free technical support to teams including guards?"
    answer: "Yes, when you rely on us, we ensure that we are readily available to help you with your concerns at any time of the day. We offer a 24/7 customer support service to our clients. You can reach us for any technical support required or any other query you want to get answered. You can live chat with our customer care executive or email us at info@novagems.com."
  - question: "Do you offer discounts?"
    answer: "Yes, we offer volume discounts and discounts for paying annually. To discuss discounts applicable on your volume orders or annual payment, contact us by sending an email at info@novagems.com. You can also live chat with us using the Novagems platform/ website."
  - question: "Can I edit the reports before I send them to the client?"
    answer: "Yes, the software-generated reports are editable and you can make the desired changes before you share them with the clients."
  - question: "Do the guard devices need to be online while using the service?"
    answer: "To avoid any discrepancies in the results, it is recommended that the guard devices be online while using the service."
  - question: "Can the software be used on smartphones and laptops both?"
    answer: "Yes, Novagems software can be used on smartphones and laptops both. It is compatible with all operative systems."
  - question: "How many guards can I add?"
    answer: "You can add unlimited guards without paying any extra charge."
  - question: "What is the maximum number of Sites I can add?"
    answer: "You can add unlimited sites without paying any extra charge."
  - question: "Is my data secure?"
    answer: "Yes, your data is safely stored in clouds which are only accessible with authentic user access only, you can rely on this cloud-based application for your confidential and sensitive data and manage the security by providing restricted and limited user access."
  - question: "Will the software let me know if my officers are not doing their patrols or job duties?"
    answer: "Yes, the GPS tracking and Geo-fencing feature will send you an alert when a security guard has missed a security checkpoint. You can also live to monitor the movement of your security guards and take appropriate actions."
  - question: "Can I schedule a free demo for the software?"
    answer: "You can schedule a free demo for the software, to request a free demo, email us at info@novagems.com Or contact us 1-844-844-0038."
  - question: "How long my data is stored?"
    answer: "As long as you have the subscription of Novagems, your data is safely and securely stored in the cloud and available to access anytime."
  - question: "What is a workforce management system?"
    answer: "A workforce management system provides the right set of tools for tracking, scheduling, and assigning work in a systematic manner.  With the help of this system, you can minimize your workload and maximize productivity. This software is the most beneficial tool in the cleaning services industry and security guard companies where employees are required to stay away from offices for numerous hours."
  - question: "What are the benefits of using workforce management software?"
    answer: "A workforce management system will not only help you reduce the extra cost spent in scheduling your workforce but will also boost the productivity of the employees. This will save the hassle of maintaining spreadsheets, timesheets, and tracking. When the performance of your company will increase so will the reputation and credibility."
  - question: "How do you monitor cleaning services?"
    answer: "When it comes to managing cleaning services, there are many cleaning services software available. You need to choose the one which meets your requirements and optimizes the work. You can rely on Novagems which provides features like scheduling, tracking, and team chat like features on one platform. "
  - question: "The system keeps on crashing when I try to operate it. Can you please help?"
    answer: "You can always reach the support system at Novagems or directly call them at 1-844-844-0038. Your query will be taken up as a priority and they will try to resolve it within 7 days or before that. Novagems keeps customer services as its priority and is always available to assist the needs of its customers."
  - question: "What is a mobile patrol?"
    answer: "A mobile patrol is a security service that involves trained security personnel traveling around a designated area in a vehicle to monitor and ensure the safety of the area. Mobile patrols can be scheduled at regular intervals or can be conducted randomly to deter criminal activity, respond to alarms, and provide a visible security presence."
  - question: "How often should mobile patrols be conducted?"
    answer: "The frequency of mobile patrols depends on the needs of the designated area and the level of security required. Mobile patrols can be scheduled at regular intervals, such as every hour or every night, or they can be conducted randomly to provide a more unpredictable security presence."
  - question: "How can I hire a mobile patrol service?"
    answer: "To hire a mobile patrol service, you can research security companies in your area and request quotes for their services. It's important to choose a reputable company with trained security personnel and a proven track record of providing effective mobile patrol services. There is much software available online with the help of which you hire trained mobile security officers. "
