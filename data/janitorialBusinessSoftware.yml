items:
  - title: "What makes a strong janitorial team?"
    text: A strong janitorial team is reliable, detail-oriented, and communicates effectively. They work together seamlessly, continuously improve their skills, and prioritize professionalism, adaptability, safety, and customer satisfaction.
  - title: "Invoicing"
    text: Get a user friendly, easy to use software that will help in simplifying invoicing, customization, tracking, financial transparency, and operational efficiency.
  - title: "Scheduling Software"
    text: A user-friendly system that gives the business owner and employees a better way to work, collaborate and manage shifts. Replace manual tasks of resource allocation with a solution that can fit anywhere anytime.  
   